<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maritime Risk Analysis System</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <button id="sidebar-close" class="sidebar-close">✕</button>
            <div class="header-container">
                <div class="header-icon">
                    <i class="fas fa-route"></i>
                </div>
                <h1>Maritime Route Risk Analysis</h1>
            </div>
            
            <div id="stops-container"></div>

            <button id="calculate-route" disabled>Check Route & Calculate Risks</button>
            <button id="view-chokepoints-btn"
                onclick="showChokepoints()"
                style="display:none; margin-top:10px; background:#b71c1c;">
            <i class="fas fa-ship-wheel"></i> View Chokepoints
            </button>
            
            <div class="visibility-controls" id="visibility-controls" style="display: none; margin-top: 20px; padding: 15px; background-color: rgba(255, 255, 255, 0.1); border-radius: 5px;">
                <h3 style="font-size: 16px; margin-bottom: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.2); padding-bottom: 8px;">Map Layers</h3>
    
                <label style="display: flex; align-items: center; margin-bottom: 10px; cursor: pointer;">
                    <input type="checkbox" id="toggle-disasters" checked style="width: auto; margin-right: 10px; cursor: pointer;">
                    <span style="font-weight: normal;">Show Disaster Alerts</span>
                </label>
    
                <label style="display: flex; align-items: center; margin-bottom: 10px; cursor: pointer;">
                    <input type="checkbox" id="toggle-congestion" checked style="width: auto; margin-right: 10px; cursor: pointer;">
                    <span style="font-weight: normal;">Show Ships</span>
                </label>
    
                <label style="display: flex; align-items: center; margin-bottom: 10px; cursor: pointer;">
                    <input type="checkbox" id="toggle-protected" checked style="width: auto; margin-right: 10px; cursor: pointer;">
                    <span style="font-weight: normal;">Show Protected Areas (ECA/MPA)</span>
                </label>
            </div>
            
            <div class="loading" id="loading">
                <i class="fas fa-spinner"></i> Calculating route...
            </div>
            
            <div class="route-info" id="route-info" style="display: none;">
                <h3>Route Information</h3>
                <p id="route-length"></p>
                <div id="segment-info"></div>
                <div id="disaster-alerts"></div>
                <div id="ship-alerts"></div>
                <div id="congestion-alerts"></div>
            </div>
        </div>
        
        <div class="main-content">
            <div class="map-container">
                <div id="map"></div>
                <button id="sidebar-open" class="sidebar-open">
                    <i class="fas fa-bars"></i>
                </button>
                
                <!-- Legend Container -->
                <div class="legend-container">
                    <!-- Legend -->
                    <div class="legend">
                        <div class="legend-header">
                            <i class="fas fa-map-legend"></i>
                            <h4>Legend</h4>
                        </div>
                        
                        <div class="legend-section">
                            <h5>Ports & Route</h5>
                            <div class="legend-item">
                                <div class="legend-icon" style="color: #4CAF50;">
                                    <i class="fas fa-circle"></i>
                                </div>
                                <span>Origin Port</span>
                            </div>
                            <div class="legend-item">
                                <div class="legend-icon" style="color: #FF9800;">
                                    <i class="fas fa-circle"></i>
                                </div>
                                <span>Intermediate Stop</span>
                            </div>
                            <div class="legend-item">
                                <div class="legend-icon" style="color: #F44336;">
                                    <i class="fas fa-circle"></i>
                                </div>
                                <span>Destination Port</span>
                            </div>
                            <div class="legend-item">
                                <div class="legend-line" style="background-color: #0066ff;"></div>
                                <span>Sea Route</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Legend Toggle Button -->
                    <div class="legend-toggle">
                        <button id="legend-toggle-btn" title="Hide Legend">
                            <i class="fas fa-layer-group"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="{{ url_for('static', filename='js/map-initialization.js') }}"></script>
    <script src="{{ url_for('static', filename='js/searchable-dropdown.js') }}"></script>
    <script src="{{ url_for('static', filename='js/dropdown-manager.js') }}"></script>
    <script src="{{ url_for('static', filename='js/route-handler.js') }}"></script>
</body>
</html>
